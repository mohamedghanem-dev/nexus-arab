# .github/workflows/build-apk-admin.yml
# نفس فكرة workflow الموقع، بس بيفتح مسار /admin من نفس الدومين، وبـ app id مختلف
# عشان يتثبّت كتطبيق منفصل تماماً على الموبايل.
#
# الأسرار المطلوبة في GitHub Secrets:
#   ADMIN_URL            رابط لوحة التحكم، مثال: https://nexus-arab.vercel.app/admin
#   KEYSTORE_BASE64       ملف الـ keystore بصيغة base64 (يفضل keystore مختلف عن الموقع)
#   KEY_ALIAS
#   KEYSTORE_PASSWORD
#   KEY_PASSWORD

name: Build Admin Dashboard APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-apk-admin.yml'

jobs:
  build-admin-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Create minimal web shell
        run: |
          mkdir -p www
          echo '<!doctype html><html><body>Loading…</body></html>' > www/index.html

      - name: Write Capacitor config (يفتح رابط لوحة التحكم المنشورة مباشرة)
        run: |
          cat > capacitor.config.json << EOF
          {
            "appId": "com.nexusarab.admin",
            "appName": "Nexus Arab Admin",
            "webDir": "www",
            "server": {
              "url": "${{ secrets.ADMIN_URL }}",
              "cleartext": false
            },
            "android": {
              "allowMixedContent": false
            }
          }
          EOF

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Update App Display Name
        run: |
          sed -i 's/Nexus Arab/Nexus Arab Admin/g' android/app/src/main/res/values/strings.xml

      - name: Build Admin APK (Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Admin APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-arab-admin-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
